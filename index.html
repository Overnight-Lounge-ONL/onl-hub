<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overnight Lounge (ONL)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* Reset + base */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      /* page scrolls if image is taller than screen */
      overflow-x: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    /* Container holding the Canva image */
    .wrapper {
      position: relative;
      width: 100vw;
      max-width: 1600px; /* adjust if your Canva export is wider */
    }

    .wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Invisible clickable regions */
    .hotspot {
      position: absolute;
      display: block;
      /* no background so the Canva design shows through */
    }

    /* ---- TOP NAV HOTSPOTS (positions are estimates; tweak as needed) ---- */

    /* "Overnight Lounge" in the top bar */
    #nav-home {
      top: 1.8%;
      left: 8%;
      width: 18%;
      height: 4%;
    }

    #nav-whats-live {
      top: 1.8%;
      left: 32%;
      width: 10%;
      height: 4%;
    }

    #nav-wellness {
      top: 1.8%;
      left: 44%;
      width: 10%;
      height: 4%;
    }

    #nav-recognition {
      top: 1.8%;
      left: 56%;
      width: 12%;
      height: 4%;
    }

    #nav-jukebox {
      top: 1.8%;
      left: 71%;
      width: 14%;
      height: 4%;
    }

    #nav-activities {
      top: 1.8%;
      left: 87%;
      width: 8%;
      height: 4%;
    }

    #nav-resources {
      top: 1.8%;
      left: 96%;
      width: 8%;
      height: 4%;
    }

    /* ---- MAIN BUTTON HOTSPOTS (middle of the design) ---- */

    #btn-whats-live {
      top: 28%;
      left: 8%;
      width: 24%;
      height: 8%;
    }

    #btn-wellness {
      top: 28%;
      right: 8%;
      width: 24%;
      height: 8%;
    }

    #btn-recognition {
      top: 42%;
      left: 8%;
      width: 24%;
      height: 8%;
    }

    #btn-jukebox {
      top: 42%;
      right: 8%;
      width: 24%;
      height: 8%;
    }

    #btn-resources {
      top: 56%;
      left: 13%;
      width: 24%;
      height: 8%;
    }

    #btn-activities {
      top: 56%;
      right: 13%;
      width: 24%;
      height: 8%;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- IMPORTANT: make sure this filename matches your Canva export exactly -->
    <img src="onl-home.png" alt="Overnight Lounge (ONL) home page" />

    <!-- Top nav clickable areas -->
    <a id="nav-home" class="hotspot" href="index.html"></a>
    <a id="nav-whats-live" class="hotspot" href="whats-live.html"></a>
    <a id="nav-wellness" class="hotspot" href="wellness.html"></a>
    <a id="nav-recognition" class="hotspot" href="recognition.html"></a>
    <a id="nav-jukebox" class="hotspot" href="jukebox.html"></a>
    <a id="nav-activities" class="hotspot" href="activities.html"></a>
    <a id="nav-resources" class="hotspot" href="resources.html"></a>

    <!-- Main glowing button areas -->
    <a id="btn-whats-live" class="hotspot" href="whats-live.html"></a>
    <a id="btn-wellness" class="hotspot" href="wellness.html"></a>
    <a id="btn-recognition" class="hotspot" href="recognition.html"></a>
    <a id="btn-jukebox" class="hotspot" href="jukebox.html"></a>
    <a id="btn-resources" class="hotspot" href="resources.html"></a>
    <a id="btn-activities" class="hotspot" href="activities.html"></a>
  </div>
</body>
</html>
