<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overnight Lounge (ONL)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #000; /* black around the image on big screens */
    }

    /* Container for the Canva image */
    .wrapper {
      position: relative;
      max-width: 1560px;      /* original width of your PNG */
      margin: 0 auto;         /* center on wide screens */
    }

    .wrapper img {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Invisible clickable areas */
    .hotspot {
      position: absolute;
      display: block;
      /* no background or border so the design is unchanged */
    }

    /* Percent values are relative to the image (works when it scales) */

    /* TOP BUTTONS */
    #btn-whats-live {
      top: 26%;
      left: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-wellness {
      top: 26%;
      right: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-recognition {
      top: 40%;
      left: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-jukebox {
      top: 40%;
      right: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-resources {
      top: 54%;
      left: 14%;
      width: 24%;
      height: 9%;
    }

    #btn-activities {
      top: 54%;
      right: 14%;
      width: 24%;
      height: 9%;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- IMPORTANT: filename must match your PNG exactly -->
    <img src="onl-home.png" alt="Overnight Lounge (ONL) home" />

    <!-- Invisible links over each glowing button.
         Change the hrefs to whatever pages/sections you want. -->
    <a id="btn-whats-live" class="hotspot" href="whats-live.html"></a>
    <a id="btn-wellness" class="hotspot" href="wellness.html"></a>
    <a id="btn-recognition" class="hotspot" href="recognition.html"></a>
    <a id="btn-jukebox" class="hotspot" href="jukebox.html"></a>
    <a id="btn-resources" class="hotspot" href="resources.html"></a>
    <a id="btn-activities" class="hotspot" href="activities.html"></a>
  </div>
</body>
</html>
