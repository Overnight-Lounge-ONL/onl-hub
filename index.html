<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overnight Lounge (ONL)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* Make the page exactly one screen tall, no scroll, no black bar */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* Wrapper is exactly the viewport */
    .wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    /* Image fills the screen vertically, aligned to the top so the moon isn't cut off */
    .wrapper img {
      position: absolute;
      top: 0;
      left: 50%;
      height: 100vh;
      width: auto;
      transform: translateX(-50%);
    }

    /* Invisible clickable areas */
    .hotspot {
      position: absolute;
      display: block;
    }

    /* Positions are percentages of the image.
       These should already be close; tweak if needed. */

    /* TOP BUTTONS */
    #btn-whats-live {
      top: 26%;
      left: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-wellness {
      top: 26%;
      right: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-recognition {
      top: 40%;
      left: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-jukebox {
      top: 40%;
      right: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-resources {
      top: 54%;
      left: 14%;
      width: 24%;
      height: 9%;
    }

    #btn-activities {
      top: 54%;
      right: 14%;
      width: 24%;
      height: 9%;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Make sure this matches your image filename -->
    <img src="onl-home.png" alt="Overnight Lounge (ONL) home" />

    <!-- Clickable areas over the glowing buttons -->
    <a id="btn-whats-live" class="hotspot" href="whats-live.html"></a>
    <a id="btn-wellness" class="hotspot" href="wellness.html"></a>
    <a id="btn-recognition" class="hotspot" href="recognition.html"></a>
    <a id="btn-jukebox" class="hotspot" href="jukebox.html"></a>
    <a id="btn-resources" class="hotspot" href="resources.html"></a>
    <a id="btn-activities" class="hotspot" href="activities.html"></a>
  </div>
</body>
</html>
