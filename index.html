<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Overnight Lounge (ONL)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    /* Full screen, no scroll */
    html, body {
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
      background: #000;
    }

    /* Fake browser bar at the very top */
    .browser-bar {
      height: 40px;
      background: linear-gradient(to bottom, #e1e2e6, #c7c8cc);
      display: flex;
      align-items: center;
      padding: 0 16px;
    }

    .browser-buttons {
      display: flex;
      gap: 8px;
    }

    .browser-button {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .btn-close { background: #ff5f57; }
    .btn-min   { background: #febc2e; }
    .btn-max   { background: #28c840; }

    /* (Optional) fake address bar */
    .browser-address {
      flex: 1;
      margin-left: 24px;
      height: 18px;
      border-radius: 9px;
      background: #f4f5f7;
    }

    /* Wrapper for your Canva image, fills the rest of the screen */
    .wrapper {
      position: relative;
      width: 100vw;
      height: calc(100vh - 40px); /* full height minus browser bar */
    }

    /* Image fills the wrapper height, centered horizontally */
    .wrapper img {
      position: absolute;
      top: 0;
      left: 50%;
      height: 100%;
      width: auto;
      transform: translateX(-50%);
    }

    /* Invisible clickable areas */
    .hotspot {
      position: absolute;
      display: block;
    }

    /* Button hotpots (same as before; tweak if needed) */
    #btn-whats-live {
      top: 26%;
      left: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-wellness {
      top: 26%;
      right: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-recognition {
      top: 40%;
      left: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-jukebox {
      top: 40%;
      right: 9%;
      width: 24%;
      height: 9%;
    }

    #btn-resources {
      top: 54%;
      left: 14%;
      width: 24%;
      height: 9%;
    }

    #btn-activities {
      top: 54%;
      right: 14%;
      width: 24%;
      height: 9%;
    }
  </style>
</head>
<body>
  <!-- Fake browser bar -->
  <div class="browser-bar">
    <div class="browser-buttons">
      <div class="browser-button btn-close"></div>
      <div class="browser-button btn-min"></div>
      <div class="browser-button btn-max"></div>
    </div>
    <div class="browser-address"></div>
  </div>

  <!-- Canva image + hotspots -->
  <div class="wrapper">
    <!-- Make sure this matches your image filename -->
    <img src="onl-home.png" alt="Overnight Lounge (ONL) home" />

    <a id="btn-whats-live" class="hotspot" href="whats-live.html"></a>
    <a id="btn-wellness" class="hotspot" href="wellness.html"></a>
    <a id="btn-recognition" class="hotspot" href="recognition.html"></a>
    <a id="btn-jukebox" class="hotspot" href="jukebox.html"></a>
    <a id="btn-resources" class="hotspot" href="resources.html"></a>
    <a id="btn-activities" class="hotspot" href="activities.html"></a>
  </div>
</body>
</html>
